apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: balancit-services
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - balancit
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [service-a, service-b]
  podMetricsEndpoints:
    - targetPort: 8000
      path: /metrics
      interval: 5s
